<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tomiko Trade{% endblock %}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .content {
            flex: 1;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container">
                <a class="navbar-brand" href="#">Логотип</a>
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item"><a class="nav-link" href="{% url 'cars_catalog' country='korea' %}">Корея</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'cars_catalog' country='japan' %}">Япония</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'cars_catalog' country='china' %}">Китай</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Контакты</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <div class="content">
        <div class="container">
        {% block content %}
        {% endblock %}
        </div>
    </div>

    <section id="clips" style="padding: 20px;">
        <h2 style="margin-bottom: 20px;">Клипы</h2>

        <div style="display: flex; overflow-x: auto; gap: 15px; padding: 10px 0;">
            {% for clip in clips %}
            <a href="{{ clip.post_url }}" target="_blank" style="text-decoration: none;">
                <div style="
                    width: 150px;
                    height: 264px;
                    border-radius: 15px;
                    overflow: hidden;
                    flex-shrink: 0;
                    position: relative;
                ">
                    <img
                        src="{{ clip.preview_url }}"
                        alt="Клип"
                        style="
                            width: 100%;
                            height: 100%;
                            object-fit: cover;
                        "
                    >
                </div>
            </a>
            {% empty %}
            <p>Клипы не найдены</p>
            {% endfor %}
        </div>
    </section>

    <footer class="bg-light mt-3">
        <div class="container py-4">
            <div class="row">
                <div class="col-md-2"><a href="{% url 'cars_catalog' country='korea' %}">Корея</a></div>
                <div class="col-md-2"><a href="{% url 'cars_catalog' country='japan' %}">Япония</a></div>
                <div class="col-md-2"><a href="{% url 'cars_catalog' country='china' %}">Китай</a></div>
                <div class="col-md-2"><a href="#">Доставка</a></div>
                <div class="col-md-2"><a href="#">Отзывы</a></div>
                <div class="col-md-2"><a href="#">Информация о компании</a></div>
            </div>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
